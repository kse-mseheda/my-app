name: ClusterFuzzLite

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions: read-all

jobs:
  fuzzing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Jazzer.js
        run: npm install --no-save @jazzer.js/core

      - name: Fuzz transform
        run: npx jazzer fuzz/fuzz_transform.js --timeout=120

      - name: Fuzz merge
        run: npx jazzer fuzz/fuzz_merge.js --timeout=120
