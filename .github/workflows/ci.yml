name: Main Build

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker-build-sign:
   needs: build-and-test
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v6

     - uses: sigstore/cosign-installer@v3

     - uses: docker/login-action@v4
       with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GHCR_PAT }}

     - name: Build and push
       id: build
       uses: docker/build-push-action@v7
       with:
         context: .
         push: true
         tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

     - name: Sign with Cosign (keyless)
       run: |
         cosign sign --yes \
           ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

     - name: Verify signature
       run: |
         cosign verify \
           --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
           --certificate-identity-regexp="github.com/${{ github.repository }}" \
           ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

  docker-build-push:
    needs: build-and-test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

  sbom-and-scan:
    needs: docker-build-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM to Dependency-Track
        run: |
          curl -sf -X POST "${{ vars.DTRACK_URL }}/api/v1/bom" \
            -H "X-Api-Key: ${{ secrets.DTRACK_API_KEY }}" \
            -H "Content-Type: multipart/form-data" \
            -F "projectName=my-app" \
            -F "projectVersion=${{ github.sha }}" \
            -F "autoCreate=true" \
            -F "bom=@sbom.cdx.json"

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

  update-deployment:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/kse-labs-deployment
          token: ${{ secrets.DEPLOYMENT_PAT }}

      - name: Update image tag
        run: |
          sed -i "s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|" \
            applications/my-app/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add applications/my-app/deployment.yaml
          git diff --cached --quiet || \
            (git commit -m "deploy: my-app ${{ github.sha }}" && git push)